services:
  web:
    build: .
    container_name: nyrvana-v2-web
    restart: unless-stopped
    networks:
      - nyrvana_net
    ports:
      - "127.0.0.1:3010:3001"
    environment:
      - NYRVANA_API_BASE=http://nyrvana-v2-bun-backend:3002
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  nyrvana_net:
    external: true
