# Block PRs whose changed files contain em-dash (U+2014) or en-dash (U+2013).
# Rationale: SOUL.md + CLAUDE.md project rules prohibit these characters across
# all output. The AI agents (Hermes, Claude) routinely violate this rule despite
# being told; CI enforcement is the only reliable backstop.
#
# Exemptions: PRs labeled "allow-dashes" are skipped. Use sparingly (verbatim
# quotes of upstream documentation that contains them).
#
# To rename: replace ":" with the Markdown bullet style you prefer.

name: no em dashes

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'allow-dashes') }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Find em-dash and en-dash in changed files
        id: scan
        run: |
          set -uo pipefail
          # Get the diff between base and head, list changed files
          base_sha='${{ github.event.pull_request.base.sha }}'
          head_sha='${{ github.event.pull_request.head.sha }}'
          changed_files=$(git diff --name-only --diff-filter=AM "$base_sha" "$head_sha")
          if [ -z "$changed_files" ]; then
            echo "No changed files; skipping."
            exit 0
          fi
          echo "Changed files:"
          echo "$changed_files"
          echo ""
          # Search each file's added lines (not removed) for em/en dash
          violations=""
          for f in $changed_files; do
            if [ ! -f "$f" ]; then
              continue
            fi
            # Skip binary files (heuristic: grep returns "binary file matches" for those)
            if file -b "$f" | grep -qE 'image|binary'; then
              continue
            fi
            # Find lines with U+2014 (em dash) or U+2013 (en dash)
            matches=$(grep -nP "[\\x{2013}\\x{2014}]" "$f" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              violations="${violations}=== $f ===\n${matches}\n\n"
            fi
          done
          if [ -n "$violations" ]; then
            echo "::error::PR contains em-dash (U+2014) or en-dash (U+2013) in changed files."
            echo "::error::SOUL.md and project rules prohibit these characters."
            echo "::error::Replace with colon, semicolon, comma, period, or sentence break."
            echo "::error::To bypass (verbatim upstream quote), add the 'allow-dashes' label."
            printf "%b" "$violations"
            exit 1
          fi
          echo "OK: no em/en dashes in changed files."